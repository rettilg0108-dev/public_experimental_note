<html lang="ja">
<head>
  <meta charset="utf-8">

  <title>Synthesis Experimental Notes</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #647282;
      --line: #d7dde5;
      --panel: #ffffff;
      --accent: #245c7a;
      --bg: #eef2f5;
      --soft: #eaf3f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 32px auto;
    }
    header {
      background: var(--panel);
      border: 1px solid var(--line);
      border-top: 5px solid var(--accent);
      padding: 26px 28px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 16px 0;
    }
    .tools input[type="search"] {
      flex: 1 1 280px;
      min-width: 180px;
    }
    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }
    button, .open-note {
      width: auto;
      cursor: pointer;
      color: var(--accent);
      background: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:hover, .open-note:hover {
      border-color: var(--accent);
    }
    .new-note-button {
      white-space: nowrap;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .section {
      margin-top: 18px;
    }
    h2 {
      margin: 18px 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .note {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 4px 16px;
      padding: 16px 18px;
      color: inherit;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
    }
    .note:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(20, 35, 50, .07);
    }
    .date {
      grid-row: span 3;
      color: var(--accent);
      font-weight: 750;
      font-variant-numeric: tabular-nums;
      white-space: pre-line;
    }
    .end-date {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .title {
      color: inherit;
      font-weight: 750;
      font-size: 16px;
      text-decoration: none;
    }
    .title:hover {
      color: var(--accent);
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .status, .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--soft);
      color: #28546a;
    }
    .tag {
      background: #f4f6f8;
      color: var(--muted);
      margin-right: 5px;
    }
    .complete-summary {
      grid-column: 2;
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      grid-column: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .actions > * {
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
    }
    .completed .status {
      background: #eef5ee;
      color: #38613d;
    }
    dialog {
      width: min(560px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      color: var(--ink);
      box-shadow: 0 18px 50px rgba(20, 35, 50, .22);
    }
    dialog::backdrop {
      background: rgba(22, 34, 44, .28);
    }
    .dialog-body {
      padding: 20px;
      display: grid;
      gap: 12px;
    }
    .dialog-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    label > input, label > select, label > textarea {
      color: var(--ink);
      font-size: 15px;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
    }
    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .empty {
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      padding: 14px 16px;
      border-radius: 8px;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 30;
      transform: translateX(-50%);
      padding: 9px 12px;
      color: #fff;
      background: rgba(31, 41, 51, .94);
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }
    .toast.show { opacity: 1; }
    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 640px) {
      .wrap { width: 100%; margin: 0; }
      header { border-left: 0; border-right: 0; }
      .tools, .section, footer { margin-left: 16px; margin-right: 16px; }
      .note { grid-template-columns: 1fr; }
      .date { grid-row: auto; }
      .complete-summary, .actions { grid-column: 1; }
      .actions > * { flex: 1 1 auto; justify-content: center; }
      .tools > * { flex: 1 1 auto; }
    }
  </style>
</head>

      <button class="reopen-button" type="button" hidden>進行中に戻す</button>
    </span>
  </article>
      </template>
    </main>
    <footer>Updated: 2026-06-04. noindex / nofollow</footer>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>
  <dialog id="finish-dialog">
    <form method="dialog" class="dialog-body" id="finish-form">
      <p class="dialog-title">実験を終了登録</p>
      <label>
        終了日
        <input id="finished-date" type="date" required>
      </label>
      <label>
        結果
        <select id="finished-outcome" required>
          <option value="追加検討必要">追加検討必要</option>
          <option value="成功">成功</option>
          <option value="失敗/中止">失敗/中止</option>
          <option value="保留">保留</option>
        </select>
      </label>
      <label>
        コメント
        <textarea id="finished-comment" placeholder="精製待ち、追加条件検討、目的物確認済み、など"></textarea>
      </label>
      <div class="dialog-actions">
        <button value="cancel" type="button" id="finish-cancel">Cancel</button>
        <button value="save" type="submit">保存して終了実験へ</button>
      </div>
    </form>
  </dialog>
  <script>
    const STATUS_KEY = "experimental-note-index-status:v1";
    const SHEETS_ENDPOINT_KEY = "experimental-note-sheets-test-endpoint:v1";
    const DELETED_NOTES_KEY = "experimental-note-deleted-notes:v1";
    const DUPLICATE_DRAFT_KEY = "experimental-note-duplicate-draft:v1";
    const search = document.getElementById("search");
    const template = document.getElementById("note-template");
    const ongoingList = document.getElementById("ongoing-list");
    const completedList = document.getElementById("completed-list");
    const ongoingEmpty = document.getElementById("ongoing-empty");
    const completedEmpty = document.getElementById("completed-empty");
    const dialog = document.getElementById("finish-dialog");
    const sheetsEndpointInput = document.getElementById("sheets-endpoint");
    const form = document.getElementById("finish-form");
    const finishedDate = document.getElementById("finished-date");
    const finishedOutcome = document.getElementById("finished-outcome");
    const finishedComment = document.getElementById("finished-comment");
    const finishCancel = document.getElementById("finish-cancel");
    const toast = document.getElementById("toast");
    const state = loadStatusState();
    let activeNote = null;

    function loadStatusState() {
      try {
        return JSON.parse(localStorage.getItem(STATUS_KEY) || "{}") || {};
      } catch {
        return {};
      }
    }

    function loadDeletedNoteIds() {
      try {
        return new Set(JSON.parse(localStorage.getItem(DELETED_NOTES_KEY) || "[]"));
      } catch {
        return new Set();
      }
    }

    function saveDeletedNoteIds(ids) {
      localStorage.setItem(DELETED_NOTES_KEY, JSON.stringify([...ids]));
    }

    function saveStatusState() {
      localStorage.setItem(STATUS_KEY, JSON.stringify(state));
    }

    let toastTimer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function markNoteDeleted(noteId) {
      const deleted = loadDeletedNoteIds();
      deleted.add(noteId);
      saveDeletedNoteIds(deleted);
    }

    function sheetEndpoint() {
      return localStorage.getItem(SHEETS_ENDPOINT_KEY) || "";
    }

    if (sheetsEndpointInput) sheetsEndpointInput.value = sheetEndpoint();

    function todayString() {
      return new Date().toLocaleDateString("sv-SE");
    }

    function statusId(note) {
      return note.dataset.noteId || note.dataset.storageKey || note.dataset.href;
    }

    function outcomeText(record) {
      return [record.finishedDate || record.finished_date, record.outcome, record.comment].filter(Boolean).join(" / ");
    }

    function setNoteStatus(note) {
      const record = state[statusId(note)];
      const summary = note.querySelector(".complete-summary");
      const status = note.querySelector(".status");
      const finishButton = note.querySelector(".finish-button");
      const reopenButton = note.querySelector(".reopen-button");
      const date = note.querySelector(".date");
      note.dataset.startDate ||= date.textContent.trim();
      const completed = Boolean(record) && record.status !== "ongoing";
      note.classList.toggle("completed", completed);
      if (completed) {
        status.textContent = "終了";
        summary.textContent = outcomeText(record);
        summary.hidden = false;
        finishButton.hidden = true;
        reopenButton.hidden = false;
        date.innerHTML = escapeHtmlClient(note.dataset.startDate || "") + '<span class="end-date">終了 ' + escapeHtmlClient(record.finishedDate || record.finished_date || "") + '</span>';
        completedList.append(note);
      } else {
        status.textContent = "進行中";
        summary.textContent = "";
        summary.hidden = true;
        finishButton.hidden = false;
        reopenButton.hidden = true;
        date.textContent = note.dataset.startDate || date.textContent.trim();
        ongoingList.append(note);
      }
    }

    function updateEmptyStates() {
      ongoingEmpty.hidden = Boolean(ongoingList.querySelector(".note:not([hidden])"));
      completedEmpty.hidden = Boolean(completedList.querySelector(".note:not([hidden])"));
    }

    function loadStatusFromSheets() {
      const endpoint = sheetEndpoint();
      if (!endpoint) return;
      const callbackName = "receiveIndexStatus_" + Date.now();
      window[callbackName] = rows => {
        for (const row of rows || []) {
          if (!row.note_id) continue;
          if (row.status === "completed") {
            state[row.note_id] = {
              status: "completed",
              finishedDate: row.finished_date || "",
              outcome: row.outcome || "",
              comment: row.comment || "",
              updatedAt: row.updated_at || ""
            };
          } else {
            delete state[row.note_id];
          }
        }
        saveStatusState();
        notes.forEach(setNoteStatus);
        applySearch();
        script.remove();
        delete window[callbackName];
      };
      const script = document.createElement("script");
      script.src = endpoint + (endpoint.includes("?") ? "&" : "?") + "callback=" + callbackName;
      script.onerror = () => delete window[callbackName];
      document.body.append(script);
    }

    function createDynamicNote(row) {
      if (row.note_type === "optical") return null;
      if (!row.note_id || loadDeletedNoteIds().has(row.note_id) || document.querySelector('.note[data-note-id="' + CSS.escape(row.note_id) + '"]')) return null;
      const appPath = row.note_type === "optical" ? "optical_dynamic_note_app/index.html" : "dynamic_note_app/index.html";
      const href = appPath + "?note_id=" + encodeURIComponent(row.note_id);
      const note = document.createElement("article");
      note.className = "note";
      note.dataset.href = href;
      note.dataset.noteId = row.note_id;
      note.dataset.storageKey = "";
      note.dataset.defaultStatus = row.status || "ongoing";
      note.dataset.noteDate = row.date || "";
      note.dataset.noteTitle = row.title || "";
      note.dataset.noteSubtitle = row.subtitle || "";
      note.dataset.noteTags = row.keywords || "";
      note.innerHTML =
        '<span class="date"></span>' +
        '<a class="title"></a>' +
        '<span class="subtitle"></span>' +
        '<span class="row">' +
          '<span class="status">進行中</span>' +
          '<span class="tags"></span>' +
        '</span>' +
        '<span class="complete-summary" hidden></span>' +
        '<span class="actions">' +
          '<button class="duplicate-button" type="button">複製</button>' +
          '<button class="delete-button" type="button">削除</button>' +
          '<button class="finish-button" type="button">終了登録</button>' +
          '<button class="reopen-button" type="button" hidden>進行中に戻す</button>' +
        '</span>';
      note.querySelector(".date").textContent = formatDateOnly(row.date || "");
      note.querySelector(".title").textContent = row.title || "(untitled)";
      note.querySelector(".title").href = href;
      note.querySelector(".subtitle").textContent = row.subtitle || [row.method, row.product].filter(Boolean).join(": ");
      const tags = String(row.keywords || "").split(/[,、\s]+/).map(tag => tag.trim()).filter(Boolean);
      note.querySelector(".tags").innerHTML = (tags.length ? tags : ["Sheets note"]).map(tag => '<span class="tag">' + escapeHtmlClient(tag) + '</span>').join("");
      note.querySelector(".finish-button").addEventListener("click", () => {
        activeNote = note;
        const record = state[statusId(note)] || {};
        finishedDate.value = record.finishedDate || todayString();
        finishedOutcome.value = record.outcome || "追加検討必要";
        finishedComment.value = record.comment || "";
        dialog.showModal();
      });
      note.querySelector(".reopen-button").addEventListener("click", () => {
        const id = statusId(note);
        delete state[id];
        saveStatusState();
        postStatusToSheets({ note_id: id, status: "ongoing", finished_date: "", outcome: "", comment: "", updated_at: new Date().toISOString() });
        setNoteStatus(note);
        applySearch();
      });
      note.querySelector(".duplicate-button").addEventListener("click", event => {
        event.stopPropagation();
        showToast("複製元を読み込みます");
        const duplicateAppPath = row.note_type === "optical" ? "optical_dynamic_note_app/index.html" : "dynamic_note_app/index.html";
        location.href = duplicateAppPath + "?duplicate_from=" + encodeURIComponent(row.note_id);
      });
      note.querySelector(".delete-button").addEventListener("click", event => {
        event.stopPropagation();
        if (!confirm("このノートを削除/アーカイブします。よろしいですか？")) return;
        markNoteDeleted(row.note_id);
        postNoteArchive(row, true);
        note.remove();
        const index = notes.indexOf(note);
        if (index >= 0) notes.splice(index, 1);
        showToast("削除しました");
        applySearch();
      });
      return note;
    }

    function notePrefill(note) {
      if (note.dataset.noteTemplate) {
        try {
          return JSON.parse(note.dataset.noteTemplate);
        } catch {
          // Fall back to card text below.
        }
      }
      const title = note.dataset.noteTitle || note.querySelector(".title")?.textContent.trim() || "";
      const colonIndex = title.indexOf(":");
      const method = colonIndex >= 0 ? title.slice(0, colonIndex).trim() : title;
      const product = colonIndex >= 0 ? title.slice(colonIndex + 1).trim() : "";
      return {
        date: todayString(),
        method,
        product,
        title,
        keywords: note.dataset.noteTags || "",
        subtitle: note.dataset.noteSubtitle || note.querySelector(".subtitle")?.textContent.trim() || "",
        status: "ongoing"
      };
    }

    function duplicateStaticNote(note) {
      localStorage.setItem(DUPLICATE_DRAFT_KEY, JSON.stringify(notePrefill(note)));
      showToast("複製テンプレートを作成しました");
      location.href = "dynamic_note_app/index.html?draft=1";
    }

    function deleteNoteCard(note) {
      const id = statusId(note);
      if (!confirm("このノートを削除/非表示にします。よろしいですか？")) return;
      markNoteDeleted(id);
      postNoteArchive({
        note_id: id,
        date: note.dataset.noteDate || note.querySelector(".date")?.textContent.trim() || "",
        title: note.dataset.noteTitle || note.querySelector(".title")?.textContent.trim() || "",
        subtitle: note.dataset.noteSubtitle || note.querySelector(".subtitle")?.textContent.trim() || "",
        keywords: note.dataset.noteTags || "",
        status: note.dataset.defaultStatus || "ongoing"
      }, true);
      note.remove();
      const index = notes.indexOf(note);
      if (index >= 0) notes.splice(index, 1);
      showToast("削除しました");
      applySearch();
    }

    function formatDateOnly(value) {
      const text = String(value || "").trim();
      const iso = text.match(/\d{4}-\d{2}-\d{2}/);
      if (iso) return iso[0];
      const parsed = new Date(text);
      if (!Number.isNaN(parsed.getTime())) return parsed.toLocaleDateString("sv-SE");
      return text;
    }

    function escapeHtmlClient(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
    }

    function loadDynamicNotesFromSheets() {
      const endpoint = sheetEndpoint();
      if (!endpoint) return;
      const callbackName = "receiveSheetNotes_" + Date.now();
      window[callbackName] = rows => {
        const created = [];
        for (const row of rows || []) {
          const note = createDynamicNote(row);
          if (note) {
            notes.push(note);
            created.push(note);
          }
        }
        for (const note of created) setNoteStatus(note);
        applySearch();
        loadStatusFromSheets();
        script.remove();
        delete window[callbackName];
      };
      const script = document.createElement("script");
      script.src = endpoint + (endpoint.includes("?") ? "&" : "?") + "kind=notes&callback=" + callbackName;
      script.onerror = () => delete window[callbackName];
      document.body.append(script);
    }

    function postStatusToSheets(record) {
      const endpoint = sheetEndpoint();
      if (!endpoint) return;
      fetch(endpoint, { method: "POST", mode: "no-cors", body: JSON.stringify(record) }).catch(() => {});
    }

    function postNoteArchive(row, archived) {
      const endpoint = sheetEndpoint();
      if (!endpoint) return;
      fetch(endpoint, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          kind: "note",
          note_id: row.note_id,
          date: row.date || "",
          title: row.title || "",
          subtitle: row.subtitle || "",
          method: row.method || "",
          product: row.product || "",
          keywords: row.keywords || "",
          status: row.status || "ongoing",
          note_type: row.note_type || "synthesis",
          archived,
          updated_at: new Date().toISOString()
        })
      }).catch(() => {});
    }

    template.replaceWith(...template.content.childNodes);
    let notes = [...document.querySelectorAll(".note")];
    for (const note of notes) {
      if (loadDeletedNoteIds().has(statusId(note))) {
        note.remove();
        continue;
      }
      const key = note.dataset.storageKey;
      if (key) {
        try {
          const saved = JSON.parse(localStorage.getItem(key) || "null");
          const savedTitle = saved?.title || saved?.editable?.[0]?.replace(/<[^>]*>/g, "").trim() || saved?.values?.[0]?.html?.replace(/<[^>]*>/g, "").trim();
          if (savedTitle) note.querySelector(".title").textContent = savedTitle;
        } catch {
          // Ignore malformed local edits.
        }
      }
      note.querySelector(".finish-button").addEventListener("click", () => {
        activeNote = note;
        const record = state[statusId(note)] || {};
        finishedDate.value = record.finishedDate || todayString();
        finishedOutcome.value = record.outcome || "追加検討必要";
        finishedComment.value = record.comment || "";
        dialog.showModal();
      });
      note.querySelector(".reopen-button").addEventListener("click", () => {
        const id = statusId(note);
        delete state[id];
        saveStatusState();
        postStatusToSheets({ note_id: id, status: "ongoing", finished_date: "", outcome: "", comment: "", updated_at: new Date().toISOString() });
        setNoteStatus(note);
        applySearch();
      });
      note.querySelector(".duplicate-button")?.addEventListener("click", event => {
        event.stopPropagation();
        duplicateStaticNote(note);
      });
      note.querySelector(".delete-button")?.addEventListener("click", event => {
        event.stopPropagation();
        deleteNoteCard(note);
      });
      setNoteStatus(note);
    }
    notes = notes.filter(note => note.isConnected);
    for (const note of notes) {
      note.addEventListener("click", event => {
        if (event.target.closest("button,a")) return;
        const href = note.dataset.href;
        if (href) location.href = href;
      });
    }
    finishCancel.addEventListener("click", () => dialog.close());
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!activeNote) return;
      const id = statusId(activeNote);
      state[id] = {
        status: "completed",
        finishedDate: finishedDate.value || todayString(),
        outcome: finishedOutcome.value,
        comment: finishedComment.value.trim(),
        updatedAt: new Date().toISOString()
      };
      saveStatusState();
      postStatusToSheets({
        note_id: id,
        status: "completed",
        finished_date: state[id].finishedDate,
        outcome: state[id].outcome,
        comment: state[id].comment,
        updated_at: state[id].updatedAt
      });
      setNoteStatus(activeNote);
      showToast("終了登録しました");
      activeNote = null;
      dialog.close();
      applySearch();
    });
    function applySearch() {
      const q = search.value.trim().toLowerCase();
      for (const note of notes) {
        note.hidden = q && !note.innerText.toLowerCase().includes(q);
      }
      updateEmptyStates();
    }
    search.addEventListener("input", applySearch);
    document.getElementById("save-sheets-endpoint")?.addEventListener("click", () => {
      if (!sheetsEndpointInput) return;
      localStorage.setItem(SHEETS_ENDPOINT_KEY, sheetsEndpointInput.value.trim());
      showToast("Sheets URLを保存しました");
      loadDynamicNotesFromSheets();
      loadStatusFromSheets();
    });
    document.getElementById("load-sheet-status")?.addEventListener("click", () => {
      showToast("Sheetsを再読込します");
      loadDynamicNotesFromSheets();
      loadStatusFromSheets();
    });
    applySearch();
    loadDynamicNotesFromSheets();
    loadStatusFromSheets();
  </script>
</body>
</html>
