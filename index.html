<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <title>Experimental Notes</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #647282;
      --line: #d7dde5;
      --panel: #ffffff;
      --accent: #245c7a;
      --bg: #eef2f5;
      --soft: #eaf3f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 32px auto;
    }
    header {
      background: var(--panel);
      border: 1px solid var(--line);
      border-top: 5px solid var(--accent);
      padding: 26px 28px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .tools {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 16px 0;
    }
    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }
    button, .open-note {
      width: auto;
      cursor: pointer;
      color: var(--accent);
      background: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    button:hover, .open-note:hover {
      border-color: var(--accent);
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .section {
      margin-top: 18px;
    }
    h2 {
      margin: 18px 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .note {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 4px 16px;
      padding: 16px 18px;
      color: inherit;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .note:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(20, 35, 50, .07);
    }
    .date {
      grid-row: span 3;
      color: var(--accent);
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }
    .title {
      color: inherit;
      font-weight: 750;
      font-size: 16px;
      text-decoration: none;
    }
    .title:hover {
      color: var(--accent);
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .status, .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--soft);
      color: #28546a;
    }
    .tag {
      background: #f4f6f8;
      color: var(--muted);
      margin-right: 5px;
    }
    .complete-summary {
      grid-column: 2;
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      grid-column: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .actions > * {
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
    }
    .completed .status {
      background: #eef5ee;
      color: #38613d;
    }
    dialog {
      width: min(560px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      color: var(--ink);
      box-shadow: 0 18px 50px rgba(20, 35, 50, .22);
    }
    dialog::backdrop {
      background: rgba(22, 34, 44, .28);
    }
    .dialog-body {
      padding: 20px;
      display: grid;
      gap: 12px;
    }
    .dialog-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    label > input, label > select, label > textarea {
      color: var(--ink);
      font-size: 15px;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
    }
    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .empty {
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      padding: 14px 16px;
      border-radius: 8px;
    }
    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 640px) {
      .wrap { width: 100%; margin: 0; }
      header { border-left: 0; border-right: 0; }
      .tools, .section, footer { margin-left: 16px; margin-right: 16px; }
      .note { grid-template-columns: 1fr; }
      .date { grid-row: auto; }
      .complete-summary, .actions { grid-column: 1; }
      .actions > * { flex: 1 1 auto; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Experimental Notes</h1>
      <p class="lead">日付・タイトルから実験ノートを開くためのトップページです。各ノート本文はパスワードで保護されています。</p>
    </header>
    <div class="tools">
      <input id="search" type="search" placeholder="Search by date, title, reagent, tag..." aria-label="Search notes">
      <a class="open-note" href="sheet_sync_test/index.html">Sheets sync test</a>
    </div>
    <main>
      <section class="section" aria-labelledby="ongoing-heading">
        <h2 id="ongoing-heading">進行中</h2>
        <div class="list" id="ongoing-list"></div>
        <div class="empty" id="ongoing-empty" hidden>進行中の実験はありません。</div>
      </section>
      <section class="section" aria-labelledby="completed-heading">
        <h2 id="completed-heading">終了実験</h2>
        <div class="list" id="completed-list"></div>
        <div class="empty" id="completed-empty" hidden>終了登録された実験はありません。</div>
      </section>
      <template id="note-template">
        <article class="note" data-href="notes/2026-06-01_xphos_naotbu_reaction1/index.html" data-storage-key="experimental-note:2026-06-01-xphos-reaction1:v3" data-default-status="planned">
    <span class="date">2026-06-01</span>
    <a class="title" href="notes/2026-06-01_xphos_naotbu_reaction1/index.html">XPhos Buchwald-Hartwig coupling: m346</a>
    <span class="subtitle">Pd2dba3/XPhos, KOt-Bu, toluene; reaction 1 rerun</span>
    <span class="row">
      <span class="status">進行中</span>
      <span class="tags"><span class="tag">Buchwald-Hartwig</span><span class="tag">XPhos</span><span class="tag">KOt-Bu</span><span class="tag">C-N coupling</span></span>
    </span>
    <span class="complete-summary" hidden></span>
    <span class="actions">
      <a class="open-note" href="notes/2026-06-01_xphos_naotbu_reaction1/index.html">Open</a>
      <button class="finish-button" type="button">終了登録</button>
      <button class="reopen-button" type="button" hidden>進行中に戻す</button>
    </span>
  </article>
<article class="note" data-href="notes/2026-06-01_thiol_sulfonate_substitution/index.html" data-storage-key="experimental-note:2026-06-01-thiol-sulfonate-substitution:v4" data-default-status="planned">
    <span class="date">2026-06-01</span>
    <a class="title" href="notes/2026-06-01_thiol_sulfonate_substitution/index.html">Thiol substitution: Thiol sulfonate IR1061</a>
    <span class="subtitle">sodium 3-mercaptopropanesulfonate, NEt3, DMF, rt, 3 h</span>
    <span class="row">
      <span class="status">進行中</span>
      <span class="tags"><span class="tag">thiol</span><span class="tag">sulfonate</span><span class="tag">DMF</span><span class="tag">cyanine</span></span>
    </span>
    <span class="complete-summary" hidden></span>
    <span class="actions">
      <a class="open-note" href="notes/2026-06-01_thiol_sulfonate_substitution/index.html">Open</a>
      <button class="finish-button" type="button">終了登録</button>
      <button class="reopen-button" type="button" hidden>進行中に戻す</button>
    </span>
  </article>
<article class="note" data-href="notes/2026-05-29_buchwald_c_n_coupling/index.html" data-storage-key="experimental-note:2026-05-29-buchwald:v3" data-default-status="planned">
    <span class="date">2026-05-29</span>
    <a class="title" href="notes/2026-05-29_buchwald_c_n_coupling/index.html">Buchwald-Hartwig C-N coupling 検討</a>
    <span class="subtitle">Pd2dba3/BINAP, KOt-Bu, toluene</span>
    <span class="row">
      <span class="status">進行中</span>
      <span class="tags"><span class="tag">Buchwald-Hartwig</span><span class="tag">C-N coupling</span><span class="tag">azo dye</span></span>
    </span>
    <span class="complete-summary" hidden></span>
    <span class="actions">
      <a class="open-note" href="notes/2026-05-29_buchwald_c_n_coupling/index.html">Open</a>
      <button class="finish-button" type="button">終了登録</button>
      <button class="reopen-button" type="button" hidden>進行中に戻す</button>
    </span>
  </article>
      </template>
    </main>
    <footer>Updated: 2026-06-03. noindex / nofollow</footer>
  </div>
  <dialog id="finish-dialog">
    <form method="dialog" class="dialog-body" id="finish-form">
      <p class="dialog-title">実験を終了登録</p>
      <label>
        終了日
        <input id="finished-date" type="date" required>
      </label>
      <label>
        結果
        <select id="finished-outcome" required>
          <option value="追加検討必要">追加検討必要</option>
          <option value="成功">成功</option>
          <option value="失敗/中止">失敗/中止</option>
          <option value="保留">保留</option>
        </select>
      </label>
      <label>
        コメント
        <textarea id="finished-comment" placeholder="精製待ち、追加条件検討、目的物確認済み、など"></textarea>
      </label>
      <div class="dialog-actions">
        <button value="cancel" type="button" id="finish-cancel">Cancel</button>
        <button value="save" type="submit">保存して終了実験へ</button>
      </div>
    </form>
  </dialog>
  <script>
    const STATUS_KEY = "experimental-note-index-status:v1";
    const search = document.getElementById("search");
    const template = document.getElementById("note-template");
    const ongoingList = document.getElementById("ongoing-list");
    const completedList = document.getElementById("completed-list");
    const ongoingEmpty = document.getElementById("ongoing-empty");
    const completedEmpty = document.getElementById("completed-empty");
    const dialog = document.getElementById("finish-dialog");
    const form = document.getElementById("finish-form");
    const finishedDate = document.getElementById("finished-date");
    const finishedOutcome = document.getElementById("finished-outcome");
    const finishedComment = document.getElementById("finished-comment");
    const finishCancel = document.getElementById("finish-cancel");
    const state = loadStatusState();
    let activeNote = null;

    function loadStatusState() {
      try {
        return JSON.parse(localStorage.getItem(STATUS_KEY) || "{}") || {};
      } catch {
        return {};
      }
    }

    function saveStatusState() {
      localStorage.setItem(STATUS_KEY, JSON.stringify(state));
    }

    function todayString() {
      return new Date().toLocaleDateString("sv-SE");
    }

    function statusId(note) {
      return note.dataset.storageKey || note.dataset.href;
    }

    function outcomeText(record) {
      return [record.finishedDate, record.outcome, record.comment].filter(Boolean).join(" / ");
    }

    function setNoteStatus(note) {
      const record = state[statusId(note)];
      const summary = note.querySelector(".complete-summary");
      const status = note.querySelector(".status");
      const finishButton = note.querySelector(".finish-button");
      const reopenButton = note.querySelector(".reopen-button");
      note.classList.toggle("completed", Boolean(record));
      if (record) {
        status.textContent = "終了";
        summary.textContent = outcomeText(record);
        summary.hidden = false;
        finishButton.hidden = true;
        reopenButton.hidden = false;
        completedList.append(note);
      } else {
        status.textContent = "進行中";
        summary.textContent = "";
        summary.hidden = true;
        finishButton.hidden = false;
        reopenButton.hidden = true;
        ongoingList.append(note);
      }
    }

    function updateEmptyStates() {
      ongoingEmpty.hidden = Boolean(ongoingList.querySelector(".note:not([hidden])"));
      completedEmpty.hidden = Boolean(completedList.querySelector(".note:not([hidden])"));
    }

    template.replaceWith(...template.content.childNodes);
    const notes = [...document.querySelectorAll(".note")];
    for (const note of notes) {
      const key = note.dataset.storageKey;
      if (key) {
        try {
          const saved = JSON.parse(localStorage.getItem(key) || "null");
          const savedTitle = saved?.title || saved?.editable?.[0]?.replace(/<[^>]*>/g, "").trim() || saved?.values?.[0]?.html?.replace(/<[^>]*>/g, "").trim();
          if (savedTitle) note.querySelector(".title").textContent = savedTitle;
        } catch {
          // Ignore malformed local edits.
        }
      }
      note.querySelector(".finish-button").addEventListener("click", () => {
        activeNote = note;
        const record = state[statusId(note)] || {};
        finishedDate.value = record.finishedDate || todayString();
        finishedOutcome.value = record.outcome || "追加検討必要";
        finishedComment.value = record.comment || "";
        dialog.showModal();
      });
      note.querySelector(".reopen-button").addEventListener("click", () => {
        delete state[statusId(note)];
        saveStatusState();
        setNoteStatus(note);
        applySearch();
      });
      setNoteStatus(note);
    }
    finishCancel.addEventListener("click", () => dialog.close());
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!activeNote) return;
      state[statusId(activeNote)] = {
        finishedDate: finishedDate.value || todayString(),
        outcome: finishedOutcome.value,
        comment: finishedComment.value.trim()
      };
      saveStatusState();
      setNoteStatus(activeNote);
      activeNote = null;
      dialog.close();
      applySearch();
    });
    function applySearch() {
      const q = search.value.trim().toLowerCase();
      for (const note of notes) {
        note.hidden = q && !note.innerText.toLowerCase().includes(q);
      }
      updateEmptyStates();
    }
    search.addEventListener("input", applySearch);
    applySearch();
  </script>
</body>
</html>
