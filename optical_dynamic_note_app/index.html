<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <title>Optical Analysis Note</title>
  <style>
    :root { --ink:#1f2933; --muted:#647282; --line:#d7dde5; --panel:#fff; --accent:#245c7a; --bg:#eef2f5; --soft:#eaf3f7; --danger:#8a2430; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP","Segoe UI",sans-serif; font-size:16px; line-height:1.58; -webkit-text-size-adjust:100%; }
    .wrap { width:min(1120px, calc(100% - 28px)); margin:24px auto; display:grid; gap:14px; }
    header,.panel,.card { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
    header { border-top:5px solid var(--accent); padding:22px 24px; }
    h1 { margin:0 0 6px; font-size:25px; }
    h2 { margin:0 0 10px; font-size:18px; }
    h3 { margin:0 0 8px; font-size:15px; }
    .muted,.msg { color:var(--muted); font-size:13px; }
    .msg { min-height:20px; }
    .panel { padding:18px; display:grid; gap:18px; }
    section { display:grid; gap:10px; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .wide { grid-column:1 / -1; }
    label { display:grid; gap:5px; color:var(--muted); font-size:14px; font-weight:650; }
    input,textarea,select,button { width:100%; border:1px solid var(--line); border-radius:6px; padding:10px 11px; font:inherit; font-size:16px; line-height:1.4; background:#fff; color:var(--ink); }
    textarea { min-height:86px; resize:none; overflow:hidden; }
    button { width:auto; color:var(--accent); font-weight:750; cursor:pointer; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button.danger { color:var(--danger); border-color:#e2b9c0; background:#fff8f9; }
    button:disabled { opacity:.62; cursor:wait; }
    a { color:var(--accent); font-weight:750; text-decoration:none; }
    .row,.actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .actions { justify-content:flex-end; }
    .date-field { max-width:190px; }
    .card-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .card { padding:14px; display:grid; gap:10px; }
    .card-title input { color:var(--accent); font-weight:800; }
    .preset-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:end; padding:12px; border:1px solid var(--line); border-radius:8px; background:#f6f8fa; }
    .preset-bar label { min-width:150px; flex:1 1 150px; }
    .event-list { display:grid; gap:10px; }
    .event-card { border:1px solid var(--line); border-radius:8px; background:#fff; overflow:hidden; }
    .event-head { display:grid; grid-template-columns:120px 1.6fr 1fr auto; gap:8px; align-items:end; padding:10px 12px; background:#f6f8fa; border-bottom:1px solid var(--line); }
    .event-body { padding:14px; display:grid; gap:14px; }
    .mini-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .measurement-tools { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .measurement-blocks { display:grid; gap:8px; }
    .measurement-block { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fbfcfd; display:grid; gap:10px; }
    .measurement-block-head { display:flex; gap:8px; justify-content:space-between; align-items:center; }
    .measurement-block-head strong { color:var(--accent); font-size:17px; }
    .structure-preview { width:100%; max-height:260px; object-fit:contain; border:1px solid var(--line); border-radius:6px; background:#fff; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th,td { border:1px solid var(--line); padding:7px; vertical-align:top; }
    th { background:#f6f8fa; color:var(--muted); font-size:13px; text-align:left; }
    td input,td select,td textarea { border:0; padding:6px; min-width:92px; }
    .table-scroll { overflow:visible; }
    @media (max-width:820px) {
      .wrap { width:100%; margin:0; }
      header { border-left:0; border-right:0; border-radius:0; padding:22px 18px; }
      .panel { border-left:0; border-right:0; border-radius:0; padding:18px 16px; gap:20px; }
      h1 { font-size:24px; }
      h2 { font-size:20px; }
      h3 { font-size:18px; }
      .date-field { max-width:210px; }
      .grid,.card-grid,.mini-grid,.event-head { grid-template-columns:1fr; }
      .event-head { padding:13px 14px; gap:10px; }
      .event-body { padding:14px; }
      .preset-bar { display:grid; grid-template-columns:1fr; gap:10px; padding:12px; }
      .preset-bar label { min-width:0; }
      .measurement-tools { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
      .measurement-tools button { width:100%; min-height:44px; }
      .row button,.row a,.actions button { flex:1 1 auto; min-height:44px; text-align:center; justify-content:center; }
      input,textarea,select,button { min-height:44px; }
      .table-scroll table,
      .table-scroll thead,
      .table-scroll tbody,
      .table-scroll tr,
      .table-scroll th,
      .table-scroll td { display:block; width:100%; }
      .table-scroll thead { display:none; }
      .table-scroll tr { border:1px solid var(--line); border-radius:8px; padding:10px; margin:10px 0; background:#fff; }
      .table-scroll td { border:0; padding:7px 0; }
      .table-scroll td::before { content:attr(data-label); display:block; margin-bottom:4px; color:var(--muted); font-size:13px; font-weight:700; }
      .table-scroll td:last-child::before { content:""; display:none; }
      td input,td select,td textarea { border:1px solid var(--line); border-radius:6px; padding:10px 11px; min-width:0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="pageTitle">Optical Analysis Note</h1>
      <p class="muted" id="pageLead">Google Sheetsに保存する光学分析ノート。</p>
      <div class="row"><a href="../category_notes.html?type=optical">光学ノート一覧</a><a href="../index.html">入口</a></div>
      <div class="msg" id="msg"></div>
    </header>

    <main class="panel">
      <h2>化合物プロファイル</h2>
      <div class="grid">
        <label class="date-field">作成日<input id="date" type="date"></label>
        <label class="wide">project<input id="project" value="IR dye optical profiling / enzyme-responsive NIR dyes"></label>
        <label>compound ID<input id="compoundId" placeholder="m900 / IR1061-thiol"></label>
        <label>display name<input id="displayName" placeholder="Thiol sulfonate IR1061"></label>
        <label>M.W.<input id="mw" placeholder="781.07"></label>
        <label>storage<input id="storage" placeholder="-20 ℃, dark"></label>
        <label>source note<input id="sourceNote" placeholder="Synthesis note title or URL"></label>
        <label>Keywords<input id="keywords" placeholder="abs, FL, PA, cyanine"></label>
      </div>

      <section>
        <h3>化合物構造 / links</h3>
        <div class="grid">
          <label class="wide">構造画像<input id="structureFile" type="file" accept="image/*"></label>
          <label class="wide">関連リンク<textarea id="links" placeholder="合成ノート、raw data folder、Google Drive URLなど"></textarea></label>
        </div>
        <img class="structure-preview" id="structurePreview" alt="" hidden>
      </section>

      <section>
        <h3>条件別の代表値</h3>
        <div class="preset-bar">
          <button type="button" id="addSummary">代表値カードを追加</button>
          <span class="muted">溶媒、濃度、添加条件ごとに増やす。</span>
        </div>
        <div class="card-grid" id="summaryGrid"></div>
      </section>

      <section>
        <h3>lot / stock</h3>
        <div class="table-scroll">
          <table id="lotTable">
            <thead><tr><th>lot</th><th>date</th><th>state</th><th>storage</th><th>note</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="actions"><button type="button" id="addLot">lot行を追加</button></div>
      </section>

      <section>
        <h3>measurement events</h3>
        <div class="preset-bar">
          <label>測定テンプレ<select id="eventTemplate"></select></label>
          <button type="button" id="duplicateEvent">最後のeventを複製</button>
          <button type="button" id="addEvent">新規event</button>
          <button type="button" id="saveEventTemplate">最後のeventをテンプレ保存</button>
          <button type="button" id="deleteEventTemplate" class="danger">選択テンプレを削除</button>
        </div>
        <div class="event-list" id="eventList"></div>
      </section>

      <label>メモ<textarea id="memo" placeholder="この化合物としての結論、怪しい測定、次に確認すべきこと"></textarea></label>

      <div class="row">
        <button class="primary" id="saveNote" type="button">Save to Sheets</button>
        <button id="archiveNote" type="button">アーカイブ</button>
      </div>
    </main>
  </div>

  <script>
    const ENDPOINT_KEY = "experimental-note-sheets-test-endpoint:v1";
    const EVENT_TEMPLATES_KEY = "optical-note-event-templates:v1";
    const q = s => document.querySelector(s);
    const params = new URLSearchParams(location.search);
    const requestedNoteId = params.get("note_id");
    const duplicateFromId = params.get("duplicate_from");
    const state = { currentId:"" };
    const presetDefaults = {
      lot:[],
      solvent:["PBS/DMSO 1%","water","DMSO","PBS pH 7.4"],
      cuvette:["quartz 1 cm","micro cuvette","plate"],
      temperature:["25 ℃","37 ℃","rt"],
      degas:["none","Ar bubbling","N2 bubbling","freeze-pump-thaw"]
    };
    const measurementSpecs = {
      abs: { label:"Abs", fields:[["instrument","Instrument"],["place","Place"],["range","Range"],["interval","Interval"],["repeat","Repeat"]] },
      fl: { label:"FL", fields:[["instrument","Instrument"],["place","Place"],["lambda_ex","λex"],["em_range","Em range"],["interval","Interval"],["ex_width","Ex width"],["em_width","Em width"],["sensitivity","Sensitivity"]] },
      ex: { label:"Ex", fields:[["instrument","Instrument"],["place","Place"],["range","Range"],["lambda_em","λem"],["interval","Interval"],["ex_width","Ex width"],["em_width","Em width"],["sensitivity","Sensitivity"]] },
      pa: { label:"PA", fields:[["instrument","Instrument"],["place","Place"],["range","Range"],["interval","Interval"]] },
      lifetime: { label:"Lifetime", fields:[["instrument","Instrument"],["place","Place"],["lambda_ex","λex"],["em_range","Em range"],["counts","Counts"],["ex_repeat","Ex repeat"]] }
    };
    const builtInEventTemplates = {
      "Abs + FL standard": {builtin:true, techniques:["abs","fl"]},
      "Abs only": {builtin:true, techniques:["abs"]},
      "FL excitation": {builtin:true, techniques:["ex"]},
      "PA standard": {builtin:true, techniques:["pa"]},
      "Lifetime": {builtin:true, techniques:["lifetime"]},
      "enzyme/addition response": {builtin:true, techniques:["abs","fl"], enzyme:"", additive:""}
    };
    let msgTimer = null;
    function msg(text){ q("#msg").textContent=text; clearTimeout(msgTimer); if(text) msgTimer=setTimeout(()=>q("#msg").textContent="",5000); }
    function endpoint(){ return localStorage.getItem(ENDPOINT_KEY) || ""; }
    function localDateString(date = new Date()){
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }
    function normalizeDate(value, fallback = localDateString()){
      const text = String(value || "").trim();
      const iso = text.match(/\d{4}-\d{2}-\d{2}/);
      if (iso) return iso[0];
      const slash = text.match(/(\d{4})[\/.](\d{1,2})[\/.](\d{1,2})/);
      if (slash) return `${slash[1]}-${slash[2].padStart(2, "0")}-${slash[3].padStart(2, "0")}`;
      return fallback;
    }
    function today(){ return localDateString(); }
    function slug(value){ return String(value||"optical-note").trim().toLowerCase().replace(/[^a-z0-9一-龯ぁ-んァ-ンー]+/g,"-").replace(/^-+|-+$/g,"").slice(0,60) || "optical-note"; }
    function noteTitle(){ return "Optical analysis: " + (q("#displayName").value || q("#compoundId").value || "compound"); }
    function noteId(){ return [q("#date").value || today(), "optical", slug(q("#displayName").value || q("#compoundId").value)].join("-") + "-" + Math.random().toString(36).slice(2,5); }
    function blankNote(){
      return {
        note_type:"optical", note_id:"", date:today(), project:"", compoundId:"", displayName:"", mw:"", storage:"", sourceNote:"", keywords:"optical, analysis", structureImage:"", links:"",
        presets:structuredClone(presetDefaults),
        summaries:[summaryBlank("PBS, 5 uM, 25 ℃"), summaryBlank("water, 5 uM, 25 ℃")],
        lots:[{lot:"",date:"",state:"",storage:"",note:""}],
        events:[eventBlank()],
        memo:""
      };
    }
    function summaryBlank(condition="new condition"){ return {condition, lambda_abs_max:"", lambda_em_max:"", phi_fl:"", pa:"", pa_abs:"", confidence:"tentative", source:""}; }
    function eventBlank(template=q("#eventTemplate")?.value || "Abs + FL standard"){
      const source = allEventTemplates()[template] || builtInEventTemplates["Abs + FL standard"];
      const rows = source.instrumentRows ? source.instrumentRows.map(normalizeBlock) : (source.techniques || ["abs","fl"]).map(blockBlank);
      return {date:today(), title:"new measurement", mode:source.mode || rows.map(t=>measurementSpecs[t.technique].label).join(", "), lot:preferredLot(), solvent:source.solvent || "PBS/DMSO 1%", concentration:source.concentration || "5 uM", cuvette:source.cuvette || "quartz 1 cm", temperature:source.temperature || "25 ℃", enzyme:source.enzyme ?? "-", additive:source.additive ?? "-", degas:source.degas || "none", instrumentTemplate:template, instrumentRows:rows, notes:"", raw:""};
    }
    function loadCustomEventTemplates(){
      try { return JSON.parse(localStorage.getItem(EVENT_TEMPLATES_KEY) || "{}") || {}; }
      catch { return {}; }
    }
    function saveCustomEventTemplates(templates){ localStorage.setItem(EVENT_TEMPLATES_KEY, JSON.stringify(templates)); }
    function allEventTemplates(){ return {...builtInEventTemplates, ...loadCustomEventTemplates()}; }
    function renderEventTemplateOptions(){
      const select = q("#eventTemplate");
      const current = select.value || "Abs + FL standard";
      select.innerHTML = Object.keys(allEventTemplates()).map(name=>`<option value="${escapeAttr(name)}">${escapeText(name)}</option>`).join("");
      select.value = Object.prototype.hasOwnProperty.call(allEventTemplates(), current) ? current : "Abs + FL standard";
    }
    function blockBlank(type="abs"){
      const block = {technique:type};
      for (const [key] of measurementSpecs[type]?.fields || measurementSpecs.abs.fields) block[key] = "";
      return block;
    }
    function normalizeBlock(row={}){
      if (row.technique && measurementSpecs[row.technique]) return {...blockBlank(row.technique), ...row};
      const mode = String(row.mode || "").toLowerCase();
      let technique = "abs";
      if (mode.includes("lifetime")) technique = "lifetime";
      else if (mode.includes("pa")) technique = "pa";
      else if (mode.includes("excitation") || mode === "ex") technique = "ex";
      else if (mode.includes("fl")) technique = "fl";
      const block = blockBlank(technique);
      block.instrument = row.instrument || "";
      block.range = row.range || row.emission || "";
      block.lambda_ex = row.excitation || "";
      block.em_range = row.emission || "";
      block.lambda_em = row.emission || "";
      block.ex_width = row.slit || "";
      block.em_width = row.slit || "";
      block.sensitivity = row.gain || "";
      block.interval = row.scan || "";
      return block;
    }
    function post(body){ const url=endpoint(); if(!url) throw new Error("Apps Script URL未設定"); return fetch(url,{method:"POST",mode:"no-cors",body:JSON.stringify(body)}); }
    function jsonp(params, cb){
      const url=endpoint(); if(!url){ msg("Apps Script URL未設定"); return; }
      const name="cb_"+Date.now()+"_"+Math.random().toString(36).slice(2);
      const script=document.createElement("script");
      let finished = false;
      window[name]=data=>{ finished = true; cb(data); script.remove(); delete window[name]; };
      script.src=url+"?"+new URLSearchParams({...params,callback:name,_:Date.now()}).toString();
      script.onerror=()=>{ finished = true; msg("Sheets読込失敗"); delete window[name]; };
      document.body.append(script);
      setTimeout(()=>{
        if (finished) return;
        msg("Sheets読込タイムアウト。入口のURL確認、Apps Script公開設定、最新版デプロイを確認してください。");
        script.remove();
        delete window[name];
      }, 9000);
    }
    function escapeAttr(v){ return String(v??"").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;"); }
    function escapeText(v){ return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function preferredLot(){
      const lastEventLot = readEvents().at(-1)?.lot;
      if (lastEventLot) return lastEventLot;
      const firstLot = readLots().find(row => row.lot)?.lot;
      return firstLot || "";
    }
    function renderOptions(presets){
      for(const [key, values] of Object.entries(presets || presetDefaults)){
        document.querySelectorAll(`select[data-preset="${key}"]`).forEach(select=>{
          const current=select.value;
          const options = ["", ...(values||[])];
          select.innerHTML=[...new Set(options)].map(v=>`<option value="${escapeAttr(v)}">${escapeAttr(v)}</option>`).join("");
          if(current && [...select.options].some(o=>o.value===current)) select.value=current;
        });
      }
    }
    function renderSummaries(rows){
      q("#summaryGrid").innerHTML=(rows||[]).map(r=>`<article class="card summary-card">
        <label class="card-title">condition<input data-sum="condition" value="${escapeAttr(r.condition)}"></label>
        <label>lambda_abs_max<input data-sum="lambda_abs_max" value="${escapeAttr(r.lambda_abs_max)}"></label>
        <label>lambda_em_max<input data-sum="lambda_em_max" value="${escapeAttr(r.lambda_em_max)}"></label>
        <label>Phi_fl<input data-sum="phi_fl" value="${escapeAttr(r.phi_fl)}"></label>
        <label>PA<input data-sum="pa" value="${escapeAttr(r.pa)}"></label>
        <label>PA / Abs<input data-sum="pa_abs" value="${escapeAttr(r.pa_abs)}"></label>
        <label>confidence<select data-sum="confidence"><option ${r.confidence==="tentative"?"selected":""}>tentative</option><option ${r.confidence==="confirmed"?"selected":""}>confirmed</option><option ${r.confidence==="low"?"selected":""}>low</option></select></label>
        <label>source event<input data-sum="source" value="${escapeAttr(r.source)}"></label>
        <div class="actions"><button type="button" class="delete-summary danger">削除</button></div>
      </article>`).join("");
    }
    function readSummaries(){ return [...q("#summaryGrid").querySelectorAll(".summary-card")].map(card=>Object.fromEntries([...card.querySelectorAll("[data-sum]")].map(el=>[el.dataset.sum,el.value]))); }
    function renderLots(rows){
      q("#lotTable tbody").innerHTML=(rows||[]).map(r=>`<tr>
        <td data-label="lot"><input data-lot="lot" value="${escapeAttr(r.lot || "")}"></td>
        <td data-label="date"><input data-lot="date" value="${escapeAttr(r.date || r.prepared || "")}"></td>
        <td data-label="state"><input data-lot="state" value="${escapeAttr(r.state || "")}"></td>
        <td data-label="storage"><input data-lot="storage" value="${escapeAttr(r.storage || "")}"></td>
        <td data-label="note"><input data-lot="note" value="${escapeAttr(r.note || "")}"></td>
        <td data-label=""><button type="button" class="delete-row danger">削除</button></td>
      </tr>`).join("");
    }
    function readLots(){ return [...q("#lotTable tbody").rows].map(row=>Object.fromEntries([...row.querySelectorAll("[data-lot]")].map(el=>[el.dataset.lot,el.value]))); }
    function renderEvents(rows){
      q("#eventList").innerHTML=(rows||[]).map(r=>`<article class="event-card">
        <div class="event-head">
          <label class="date-field">date<input data-event="date" type="date" value="${escapeAttr(r.date)}"></label>
          <label>sheet title / purpose<input data-event="title" value="${escapeAttr(r.title)}"></label>
          <label>measurement<input data-event="mode" value="${escapeAttr(r.mode)}"></label>
          <button type="button" class="delete-event danger">削除</button>
        </div>
        <div class="event-body">
          <input type="hidden" data-event="instrumentTemplate" value="${escapeAttr(r.instrumentTemplate)}">
          <div class="mini-grid">
            <label>lot<select data-event="lot" data-preset="lot"></select></label>
            <label>solvent / buffer<select data-event="solvent" data-preset="solvent"></select></label>
            <label>final concentration<input data-event="concentration" value="${escapeAttr(r.concentration)}"></label>
            <label>cuvette<select data-event="cuvette" data-preset="cuvette"></select></label>
            <label>temperature<select data-event="temperature" data-preset="temperature"></select></label>
            <label>enzyme<input data-event="enzyme" value="${escapeAttr(r.enzyme)}"></label>
            <label>reaction molecule/additive<input data-event="additive" value="${escapeAttr(r.additive)}"></label>
            <label>degas<select data-event="degas" data-preset="degas"></select></label>
          </div>
          <details open>
            <summary>装置条件</summary>
            <div class="measurement-tools">
              ${Object.entries(measurementSpecs).map(([type, spec])=>`<button type="button" class="add-measurement" data-add-measurement="${type}">${spec.label}を追加</button>`).join("")}
            </div>
            <div class="measurement-blocks instrument-body"></div>
          </details>
          <label>観察・メモ<textarea data-event="notes" placeholder="観察、lambda max、蛍光、沈殿/濁り、次にやること">${escapeText(r.notes)}</textarea></label>
          <label>raw data / figure link<textarea data-event="raw" placeholder="raw data folder URL、画像リンク、ファイル名など">${escapeText(r.raw)}</textarea></label>
        </div>
      </article>`).join("");
      renderOptions(readPresets());
      const lotValues = readLots().map(row => row.lot).filter(Boolean);
      [...q("#eventList").querySelectorAll(".event-card")].forEach((card,i)=>{
        ["lot","solvent","cuvette","temperature","degas"].forEach(k=>{
          const el=card.querySelector(`[data-event="${k}"]`);
          const value=rows[i]?.[k] || "";
          if (k === "lot" && value && !lotValues.includes(value)) {
            if(el) el.value="";
            return;
          }
          if(el && value && ![...el.options].some(option => option.value === value)) el.add(new Option(value, value));
          if(el) el.value=value;
        });
        renderInstrumentRows(card, (rows[i]?.instrumentRows || []).map(normalizeBlock));
      });
      autosizeAll();
    }
    function renderInstrumentRows(card, rows){
      card.querySelector(".instrument-body").innerHTML=(rows||[]).map(r=>{
        const block = normalizeBlock(r);
        const spec = measurementSpecs[block.technique] || measurementSpecs.abs;
        return `<article class="measurement-block" data-technique="${escapeAttr(block.technique)}">
          <div class="measurement-block-head">
            <strong>${escapeText(spec.label)}</strong>
            <button type="button" class="delete-inst-row danger">削除</button>
          </div>
          <div class="mini-grid">
            ${spec.fields.map(([key, label])=>`<label>${label}<input data-inst="${key}" value="${escapeAttr(block[key])}"></label>`).join("")}
          </div>
        </article>`;
      }).join("");
    }
    function readEvents(){
      return [...q("#eventList").querySelectorAll(".event-card")].map(card=>{
        const base=Object.fromEntries([...card.querySelectorAll("[data-event]")].map(el=>[el.dataset.event,el.value]));
        base.instrumentRows=[...card.querySelectorAll(".measurement-block")].map(block=>({technique:block.dataset.technique, ...Object.fromEntries([...block.querySelectorAll("[data-inst]")].map(el=>[el.dataset.inst,el.value]))}));
        return base;
      });
    }
    function collect(){
      const data={note_type:"optical", note_id:state.currentId||noteId(), date:q("#date").value, project:q("#project").value, compoundId:q("#compoundId").value, displayName:q("#displayName").value, mw:q("#mw").value, storage:q("#storage").value, sourceNote:q("#sourceNote").value, keywords:q("#keywords").value, structureImage:q("#structurePreview").hidden ? "" : q("#structurePreview").src, links:q("#links").value, presets:readPresets(), summaries:readSummaries(), lots:readLots(), events:readEvents(), memo:q("#memo").value};
      data.title=noteTitle();
      const range = measurementDateRange(data.events);
      data.measurementStart = range.start;
      data.measurementEnd = range.end;
      data.subtitle=[data.project,data.compoundId,range.label].filter(Boolean).join(" / ");
      data.method="Optical analysis";
      data.product=data.displayName || data.compoundId;
      data.status="ongoing";
      return data;
    }
    function measurementDateRange(events){
      const dates = (events || []).map(event => event.date).filter(Boolean).sort();
      if (!dates.length) return {start:"", end:"", label:""};
      const start = dates[0], end = dates[dates.length - 1];
      return {start, end, label:start === end ? `measured ${start}` : `measured ${start} - ${end}`};
    }
    function readPresets(){
      const current={};
      for(const key of Object.keys(presetDefaults)){
        if (key === "lot") {
          current.lot = [...new Set(readLots().map(row => row.lot).filter(Boolean))];
          continue;
        }
        const values=[...document.querySelector(`select[data-preset="${key}"]`)?.options||[]].map(o=>o.value).filter(Boolean);
        current[key]=[...new Set(values)];
      }
      return current;
    }
    function setEditor(data){
      state.currentId=data.note_id || "";
      const note={...blankNote(), ...data, presets:{...presetDefaults, ...(data.presets||{})}};
      ["project","compoundId","displayName","mw","storage","sourceNote","keywords","links","memo"].forEach(k=>q("#"+k).value=note[k]||"");
      q("#date").value = normalizeDate(note.date, today());
      q("#structurePreview").hidden = !note.structureImage;
      q("#structurePreview").src = note.structureImage || "";
      document.title=note.title || noteTitle();
      q("#pageTitle").textContent=note.title || noteTitle();
      q("#pageLead").textContent=note.subtitle || "Google Sheetsに保存する光学分析ノート。";
      renderOptions(note.presets);
      renderSummaries(note.summaries);
      renderLots(note.lots);
      renderEvents(note.events);
      autosizeAll();
    }
    function asDuplicate(data){ return {...data, note_id:"", date:today(), status:"ongoing"}; }
    function loadNoteById(id, duplicate=false, options={}){
      jsonp({kind:"edit", note_id:id}, rec=>{
        if(rec?.payload) {
          if(options.expectSaved && options.saveToken && rec.payload._save_token !== options.saveToken) {
            msg("保存確認NG: Sheetsから返った内容が今回保存した版ではありません。Apps Script URL/デプロイ先/Sheetを確認してください。");
            return;
          }
          setEditor(duplicate ? asDuplicate(rec.payload) : rec.payload);
          msg(options.expectSaved ? "保存確認OK: Sheets保存済みノートを読み込みました。" : (duplicate ? "複製元を読み込みました" : "読み込みました"));
        }
        else msg("指定ノートが見つかりません");
      });
    }
    function verifySaved(id, saveToken, attempt=1){
      jsonp({kind:"edit", note_id:id}, rec=>{
        const payload = rec?.payload;
        if(payload?._save_token === saveToken) {
          setEditor(payload);
          msg("保存確認OK: Sheets保存済みノートを読み込みました。");
          return;
        }
        if(attempt < 6) {
          msg("保存反映待ち... " + attempt + "/6");
          setTimeout(()=>verifySaved(id, saveToken, attempt + 1), 1800);
          return;
        }
        msg("保存確認NG: Sheetsから返った内容が今回保存した版ではありません。Apps Script URL/デプロイ先/Sheetを確認してください。");
      });
    }
    async function saveCurrent(){
      const button=q("#saveNote"), old=button.textContent;
      button.disabled=true; button.textContent="Saving..."; msg("Sheetsへ保存リクエストを送信中...");
      const data=collect();
      data._save_token = Date.now() + "-" + Math.random().toString(36).slice(2);
      state.currentId=data.note_id;
      try{
        const payloadLength = JSON.stringify(data).length;
        if (payloadLength > 45000) {
          throw new Error("保存データが大きすぎます。画像はリンク欄にURLで貼るか、構造画像を小さくしてください。");
        }
        await post({kind:"note", note_id:data.note_id, date:data.measurementStart || data.date, title:data.title, subtitle:data.subtitle, method:data.method, product:data.product, keywords:data.keywords, status:"ongoing", note_type:"optical", archived:false, updated_at:new Date().toISOString()});
        await post({kind:"edit", note_id:data.note_id, note_type:"optical", payload:data, updated_at:new Date().toISOString()});
        history.replaceState(null, "", "?note_id=" + encodeURIComponent(data.note_id));
        msg("保存リクエストを送りました。Sheetsから同じノートを読み直します: " + data.note_id);
        setTimeout(() => verifySaved(data.note_id, data._save_token), 1600);
      } finally { button.disabled=false; button.textContent=old; }
    }
    function autosizeAll(){ document.querySelectorAll("textarea").forEach(t=>{ t.style.height="auto"; t.style.height=t.scrollHeight+2+"px"; }); }
    q("#saveNote").onclick=()=>saveCurrent().catch(e=>msg(e.message));
    q("#archiveNote").onclick=async()=>{ const data=collect(); await post({kind:"note", ...data, note_type:"optical", archived:true, updated_at:new Date().toISOString()}); msg("アーカイブしました"); };
    q("#addSummary").onclick=()=>{ const rows=readSummaries(); rows.push(summaryBlank()); renderSummaries(rows); };
    q("#addLot").onclick=()=>{ const rows=readLots(); rows.push({lot:"",date:"",state:"",storage:"",note:""}); renderLots(rows); renderOptions(readPresets()); };
    q("#addEvent").onclick=()=>{ const rows=readEvents(); rows.push(eventBlank()); renderEvents(rows); };
    q("#duplicateEvent").onclick=()=>{ const rows=readEvents(); rows.push({...rows.at(-1), title:(rows.at(-1)?.title || "event")+" copy"}); renderEvents(rows); };
    q("#saveEventTemplate").onclick=()=>{
      const event = readEvents().at(-1);
      if(!event) return msg("保存するeventがありません。");
      const name = prompt("テンプレ名", event.instrumentTemplate && !builtInEventTemplates[event.instrumentTemplate] ? event.instrumentTemplate : event.title || "custom measurement");
      if(!name) return;
      const templates = loadCustomEventTemplates();
      templates[name.trim()] = {
        builtin:false,
        mode:event.mode || "",
        solvent:event.solvent || "",
        concentration:event.concentration || "",
        cuvette:event.cuvette || "",
        temperature:event.temperature || "",
        enzyme:event.enzyme || "",
        additive:event.additive || "",
        degas:event.degas || "",
        instrumentRows:(event.instrumentRows || []).map(normalizeBlock)
      };
      saveCustomEventTemplates(templates);
      renderEventTemplateOptions();
      q("#eventTemplate").value = name.trim();
      msg("測定テンプレを保存しました。");
    };
    q("#deleteEventTemplate").onclick=()=>{
      const name = q("#eventTemplate").value;
      if(builtInEventTemplates[name]) return msg("標準テンプレは削除できません。");
      if(!confirm(`測定テンプレ「${name}」を削除しますか？`)) return;
      const templates = loadCustomEventTemplates();
      delete templates[name];
      saveCustomEventTemplates(templates);
      renderEventTemplateOptions();
      msg("測定テンプレを削除しました。");
    };
    document.addEventListener("click", e=>{
      if(e.target.closest(".delete-summary")) e.target.closest(".summary-card").remove();
      if(e.target.closest(".delete-row")) e.target.closest("tr").remove();
      if(e.target.closest(".delete-event") && confirm("この測定シートを削除しますか？")) e.target.closest(".event-card").remove();
      if(e.target.closest(".delete-inst-row")) e.target.closest(".measurement-block").remove();
      if(e.target.closest(".add-measurement")) {
        const card=e.target.closest(".event-card");
        const rows=readEvents()[[...q("#eventList").querySelectorAll(".event-card")].indexOf(card)].instrumentRows;
        rows.push(blockBlank(e.target.closest(".add-measurement").dataset.addMeasurement));
        renderInstrumentRows(card, rows);
      }
    });
    document.addEventListener("input", e=>{
      if(e.target.matches("textarea")) autosizeAll();
      if(e.target.matches("#displayName,#compoundId,#project")) q("#pageTitle").textContent=noteTitle();
      if(e.target.matches('[data-lot="lot"]')) {
        clearTimeout(window.__lotOptionTimer);
        window.__lotOptionTimer = setTimeout(() => renderOptions(readPresets()), 250);
      }
    });
    q("#structureFile").addEventListener("change", event => {
      const file = event.target.files?.[0];
      if (!file || !file.type.startsWith("image/")) return;
      compressImage(file).then(src => {
        q("#structurePreview").src = src;
        q("#structurePreview").hidden = false;
        msg("構造画像をSheets保存用サムネイルに圧縮しました。元画像は必要ならlinks欄へURLで保存してください。");
      }).catch(error => msg(error.message));
    });
    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxSide = 420;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            let src = canvas.toDataURL("image/jpeg", 0.72);
            if (src.length > 22000) src = canvas.toDataURL("image/jpeg", 0.48);
            if (src.length > 30000) reject(new Error("画像が大きすぎます。links欄に画像URLを貼ってください。"));
            else resolve(src);
          };
          img.onerror = () => reject(new Error("画像を読み込めませんでした。"));
          img.src = reader.result;
        };
        reader.onerror = () => reject(new Error("画像を読み込めませんでした。"));
        reader.readAsDataURL(file);
      });
    }
    renderEventTemplateOptions();
    setEditor(blankNote());
    if(requestedNoteId) loadNoteById(requestedNoteId);
    else if(duplicateFromId) loadNoteById(duplicateFromId, true);
    else if(!endpoint()) msg("Apps Script URL未設定です。Top page の Sheets settings でURLを保存してください。");
  </script>
</body>
</html>
