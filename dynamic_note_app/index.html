<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <title>Synthesis Experiment Note</title>
  <style>
    :root { --ink:#1f2933; --muted:#647282; --line:#d7dde5; --panel:#fff; --accent:#245c7a; --bg:#eef2f5; --soft:#eaf3f7; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP","Segoe UI",sans-serif; font-size:16px; line-height:1.58; -webkit-text-size-adjust:100%; }
    .wrap { width:min(1100px, calc(100% - 28px)); margin:24px auto; display:grid; gap:14px; }
    header,.panel,.note-card { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
    header { border-top:5px solid var(--accent); padding:22px 24px; }
    h1 { margin:0 0 6px; font-size:25px; }
    h2 { margin:0 0 10px; font-size:18px; }
    h3 { margin:0 0 8px; font-size:15px; }
    .muted,.msg { color:var(--muted); font-size:13px; }
    .msg { min-height:20px; }
    .panel { padding:18px; display:grid; gap:16px; }
    section { display:grid; gap:10px; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    label { display:grid; gap:5px; color:var(--muted); font-size:14px; font-weight:650; }
    input,textarea,select,button { width:100%; border:1px solid var(--line); border-radius:6px; padding:10px 11px; font:inherit; font-size:16px; line-height:1.4; background:#fff; color:var(--ink); }
    textarea { min-height:92px; resize:none; overflow:hidden; }
    button { width:auto; color:var(--accent); font-weight:750; cursor:pointer; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button:disabled { opacity:.62; cursor:wait; }
    a { color:var(--accent); font-weight:750; text-decoration:none; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .date-field { max-width:190px; }
    .layout { display:grid; grid-template-columns:1fr; gap:14px; }
    body.note-view #editorHeading { display:none; }
    .list { display:grid; gap:8px; }
    .note-card { padding:14px; display:grid; gap:6px; cursor:pointer; }
    .note-card:hover { border-color:var(--accent); }
    .note-card.active { border-color:var(--accent); box-shadow:0 0 0 2px rgba(36,92,122,.12); }
    .date { color:var(--accent); font-weight:750; font-variant-numeric:tabular-nums; font-size:13px; }
    .drop { border:2px dashed var(--line); border-radius:8px; padding:16px; text-align:center; color:var(--muted); background:#fbfcfd; }
    .drop.drag { border-color:var(--accent); background:var(--soft); }
    .image-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
    .image-grid img,.scheme-preview { width:100%; max-height:240px; object-fit:contain; border:1px solid var(--line); border-radius:6px; background:#fff; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th,td { border:1px solid var(--line); padding:7px; vertical-align:top; }
    th { background:#f6f8fa; color:var(--muted); font-size:13px; text-align:left; }
    td input,td select { border:0; padding:6px; min-width:92px; }
    .num { text-align:right; font-variant-numeric:tabular-nums; }
    .table-scroll { overflow:visible; }
    @media (max-width:800px) {
      .wrap { width:100%; margin:0; }
      header { border-left:0; border-right:0; border-radius:0; padding:22px 18px; }
      .panel { border-left:0; border-right:0; border-radius:0; padding:18px 16px; gap:18px; }
      h1 { font-size:24px; }
      h2 { font-size:20px; }
      h3 { font-size:18px; }
      .date-field { max-width:210px; }
      .layout,.grid { grid-template-columns:1fr; }
      .row button,.row a { flex:1 1 auto; min-height:44px; text-align:center; justify-content:center; }
      input,textarea,select,button { min-height:44px; }
      .drop { padding:18px 12px; }
      .table-scroll table,
      .table-scroll thead,
      .table-scroll tbody,
      .table-scroll tr,
      .table-scroll th,
      .table-scroll td { display:block; width:100%; }
      .table-scroll thead { display:none; }
      .table-scroll tr { border:1px solid var(--line); border-radius:8px; padding:10px; margin:10px 0; background:#fff; }
      .table-scroll td { border:0; padding:7px 0; }
      .table-scroll td::before { content:attr(data-label); display:block; margin-bottom:4px; color:var(--muted); font-size:13px; font-weight:700; }
      .table-scroll td:last-child::before { content:""; display:none; }
      td input,td select,td textarea { border:1px solid var(--line); border-radius:6px; padding:10px 11px; min-width:0; }
      td textarea { min-height:110px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="pageTitle">Synthesis Experiment Note</h1>
      <p class="muted" id="pageLead">Google Sheetsに保存する合成実験ノート。</p>
      <div class="row"><a href="../synthesis_notes.html">合成ノート一覧</a><a href="../index.html">入口</a></div>
      <div class="msg" id="msg"></div>
    </header>

    <div class="layout">
      <main class="panel" id="editor">
        <h2 id="editorHeading">新規 合成実験ノート</h2>
        <div class="grid">
          <label class="date-field">日付<input id="date" type="date"></label>
          <label>反応方法<input id="method" placeholder="Buchwald-Hartwig coupling"></label>
          <label>目的生成物<input id="product" placeholder="m346"></label>
          <label>状態<select id="status"><option value="ongoing">進行中</option><option value="completed">終了</option><option value="hold">保留</option></select></label>
        </div>
        <label>タイトル<input id="title" readonly placeholder="反応方法: 目的生成物"></label>
        <label>Keywords<input id="keywords" placeholder="Buchwald, thiol, cyanine など。カンマ区切り"></label>
        <label>サブタイトル<input id="subtitle" placeholder="reagents, solvent, condition"></label>

        <section>
          <h3>反応スキーム</h3>
          <div class="drop" id="schemeDrop">画像をドラッグ、ペースト、またはファイル選択</div>
          <input id="schemeFile" type="file" accept="image/*">
          <img class="scheme-preview" id="schemePreview" alt="" hidden>
        </section>

        <section>
          <h3>計算条件</h3>
          <div class="grid">
            <label>基準基質 mmol<input id="scale" type="number" step="0.001" value="0.100"></label>
            <label>溶液濃度 M<input id="conc" type="number" step="0.01" value="0.05"></label>
            <label>溶媒名<input id="solvent" value="toluene"></label>
            <label>溶媒量<input id="solventVol" readonly></label>
          </div>
        </section>

        <section>
          <h3>試薬表</h3>
          <div class="row">
            <button id="addReagent" type="button">試薬追加</button>
            <button id="addSolvent" type="button">溶媒/液体追加</button>
          </div>
          <div class="table-scroll">
            <table id="reagentTable">
              <thead><tr><th>名称</th><th>役割</th><th>MW</th><th>eq/mol%</th><th>単位</th><th>密度 g/mL</th><th>mmol</th><th>秤量/容量</th><th>削除</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section>
          <h3>操作</h3>
          <div class="row"><button id="addOperation" type="button">操作行追加</button></div>
          <div class="table-scroll">
            <table id="operationTable">
              <thead><tr><th>日付</th><th>時刻</th><th>操作</th><th>削除</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
        <label>観察・MS候補<textarea id="analysis" placeholder="m/z, UV-vis, TLCなど"></textarea></label>
        <label>メモ<textarea id="memo"></textarea></label>

        <section>
          <h3>画像メモ</h3>
          <div class="drop" id="imageDrop">画像をドラッグ、ペースト、またはファイル選択</div>
          <input id="imageFile" type="file" accept="image/*" multiple>
          <div class="image-grid" id="images"></div>
        </section>

        <div class="row">
          <button class="primary" id="saveNote" type="button">Save to Sheets</button>
          <button id="archiveNote" type="button">削除/アーカイブ</button>
        </div>
      </main>
    </div>
  </div>

  <script src="../shared_note_state.js"></script>
  <script>
    window.SharedNoteState = window.SharedNoteState || (() => {
      const key = "experimental-note-deleted-notes:v1";
      const hardDeleted = new Set(["2026-06-09-thiophene-lithiation-benzaldehyde"]);
      const deleteText = "このノートを削除/アーカイブします。終了登録とは別操作です。よろしいですか？";
      const loadDeletedNoteIds = () => {
        try { return new Set([...hardDeleted, ...JSON.parse(localStorage.getItem(key) || "[]")]); }
        catch { return new Set(hardDeleted); }
      };
      const saveDeletedNoteIds = ids => localStorage.setItem(key, JSON.stringify([...ids]));
      const markNoteDeleted = noteId => { const deleted = loadDeletedNoteIds(); deleted.add(noteId); saveDeletedNoteIds(deleted); };
      return {DELETE_CONFIRM_TEXT:deleteText, DELETED_NOTES_KEY:key, loadDeletedNoteIds, saveDeletedNoteIds, markNoteDeleted, confirmDeleteArchive:() => confirm(deleteText)};
    })();
  </script>
  <script>
    const ENDPOINT_KEY = "experimental-note-sheets-test-endpoint:v1";
    const DUPLICATE_DRAFT_KEY = "experimental-note-duplicate-draft:v1";
    const q = s => document.querySelector(s);
    let msgTimer = null;
    const msg = text => {
      q("#msg").textContent = text;
      clearTimeout(msgTimer);
      if (text) msgTimer = setTimeout(() => { q("#msg").textContent = ""; }, 5000);
    };
    const state = { notes: [], currentId: "" };
    const params = new URLSearchParams(location.search);
    const requestedNoteId = params.get("note_id");
    const duplicateFromId = params.get("duplicate_from");
    const OBSOLETE_NOTE_REDIRECTS = {
      "2026-06-09-thiophene-lithiation-benzaldehyde": "2026-06-09-thiophene-lithiation-benzaldehyde-redone"
    };
    if (OBSOLETE_NOTE_REDIRECTS[requestedNoteId]) {
      location.replace("index.html?note_id=" + encodeURIComponent(OBSOLETE_NOTE_REDIRECTS[requestedNoteId]) + "&fallback_template=1");
    }
    if (OBSOLETE_NOTE_REDIRECTS[duplicateFromId]) {
      location.replace("index.html?duplicate_from=" + encodeURIComponent(OBSOLETE_NOTE_REDIRECTS[duplicateFromId]));
    }
    const prefillData = decodePrefill(params.get("prefill"));
    const draftRequested = params.get("draft") === "1";
    const fixedTemplateRequested = params.get("fixed_template") === "1";
    const fallbackTemplateRequested = params.get("fallback_template") === "1";
    const defaultReagents = () => [
      { name:"substrate", role:"limiting", mw:100, eq:1, unit:"eq", density:"", liquid:false },
      { name:"reagent", role:"reagent", mw:100, eq:1, unit:"eq", density:"", liquid:false }
    ];
    if ((requestedNoteId || duplicateFromId) && endpoint()) document.body.classList.add("note-view");
    function endpoint() { return localStorage.getItem(ENDPOINT_KEY) || ""; }
    function localDateString(date = new Date()) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }
    function normalizeDate(value, fallback = localDateString()) {
      const text = String(value || "").trim();
      const iso = text.match(/\d{4}-\d{2}-\d{2}/);
      if (iso) return iso[0];
      const slash = text.match(/(\d{4})[\/.](\d{1,2})[\/.](\d{1,2})/);
      if (slash) return `${slash[1]}-${slash[2].padStart(2, "0")}-${slash[3].padStart(2, "0")}`;
      return fallback;
    }
    function today() { return localDateString(); }
    function slug(value) {
      return String(value || "synthesis-note").trim().toLowerCase()
        .replace(/[^a-z0-9一-龯ぁ-んァ-ンー]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 60) || "synthesis-note";
    }
    function titleFromFields(method = q("#method").value, product = q("#product").value) {
      return [method, product].filter(Boolean).join(": ") || "Synthesis Experiment Note";
    }
    function idFromFields() {
      return [q("#date").value || today(), slug(q("#method").value), slug(q("#product").value)].filter(Boolean).join("-") + "-" + Math.random().toString(36).slice(2,5);
    }
    function decodePrefill(value) {
      if (!value) return null;
      try {
        return JSON.parse(decodeURIComponent(escape(atob(value))));
      } catch {
        return null;
      }
    }
    function readDraft() {
      if (!draftRequested && !fallbackTemplateRequested) return null;
      try {
        const draft = JSON.parse(localStorage.getItem(DUPLICATE_DRAFT_KEY) || "null");
        localStorage.removeItem(DUPLICATE_DRAFT_KEY);
        return draft;
      } catch {
        return null;
      }
    }
    function asDuplicate(data) {
      return {
        ...data,
        note_id: "",
        date: today(),
        status: "ongoing",
        operations: data.operations || [{date:"", time:"", text:""}],
        memo: data.memo || "",
        analysis: data.analysis || ""
      };
    }
    function asFixedTemplate(data) {
      return {
        ...data,
        note_id: data.note_id || "",
        date: normalizeDate(data.date, today()),
        status: data.status || "ongoing",
        operations: data.operations || [{date:"", time:"", text:""}],
        memo: data.memo || "",
        analysis: data.analysis || ""
      };
    }
    function fmt(n,d=3){ if(!Number.isFinite(n)) return ""; if(Math.abs(n)>=100) return n.toFixed(1); if(Math.abs(n)>=10) return n.toFixed(2); return n.toFixed(d).replace(/0+$/,"").replace(/\.$/,""); }
    function post(body){ const url=endpoint(); if(!url) throw new Error("Apps Script URL未設定"); return fetch(url,{method:"POST",mode:"no-cors",body:JSON.stringify(body)}); }
    function jsonp(params, cb){
      const url=endpoint(); if(!url){ msg("Apps Script URL未設定"); return; }
      const name="cb_"+Date.now()+"_"+Math.random().toString(36).slice(2);
      const script=document.createElement("script");
      let finished = false;
      window[name]=data=>{ finished = true; cb(data); script.remove(); delete window[name]; };
      script.src=url+"?"+new URLSearchParams({...params,callback:name}).toString();
      script.onerror=()=>{ finished = true; msg("Sheets読込失敗"); delete window[name]; };
      document.body.append(script);
      setTimeout(() => {
        if (finished) return;
        msg("Sheets読込タイムアウト。入口のURL確認、Apps Script公開設定、最新版デプロイを確認してください。");
        script.remove();
        delete window[name];
      }, 9000);
    }
    function renderList(){
      return state.notes.map(n => `<article class="note-card ${n.note_id===state.currentId?"active":""}" data-id="${n.note_id}">
        <span class="date">${n.date||""}</span><strong>${n.title||"(untitled)"}</strong><span class="muted">${n.subtitle||""}</span>
      </article>`).join("");
    }
    const LITHIATION_NOTE_PATCH = {
      id: "2026-06-09-thiophene-lithiation-benzaldehyde-redone",
      images: [
        "https://rettilg0108-dev.github.io/public_experimental_note/assets/2026-06-09/lithiation_ms/ms_after_1h_overview.jpg",
        "https://rettilg0108-dev.github.io/public_experimental_note/assets/2026-06-09/lithiation_ms/ms_after_1h_zoom.jpg",
        "https://rettilg0108-dev.github.io/public_experimental_note/assets/2026-06-09/lithiation_ms/tlc_pma_positive.jpg"
      ],
      analysis: "反応後1 h LC-MS: ESI- m/z 189 は目的物 [M-H]- 候補として整合。ESI+ m/z 287, ESI- m/z 219 がより強く、主成分は未同定。m/z 287 は目的物そのものではなく、付加体/副生成物/装置由来イオン候補として追跡。m/z 219 は目的物 +30相当または溶媒/塩由来付加体の可能性を考えるが未確定。",
      memo: "2026-06-09: 反応後のみリンモリブデン酸(PMA)陽性。生成物がベンジルアルコールなのでOH基によりPMA陽性になった可能性はある。まだ反応溶液のままで後処理なし。後処理案: 反応液を0 ℃以下に保ち、sat. NH4Cl aq. を少量ずつ慎重に滴下して残存n-BuLi/リチウムアルコキシドをクエンチ。発熱・ガスに注意。室温へ戻してEtOAcで抽出、水/brine洗浄、Na2SO4乾燥、濃縮。まず粗LC-MS/TLC/1H NMRで m/z 189/191, 287, 219 の帰属を確認。"
    };
    function hydrateKnownNote(data) {
      if (!data || data.note_id !== LITHIATION_NOTE_PATCH.id) return data;
      const images = [...new Set([...(data.images || []), ...LITHIATION_NOTE_PATCH.images])];
      const analysis = String(data.analysis || "").includes("ESI- m/z 189") ? data.analysis : [data.analysis, LITHIATION_NOTE_PATCH.analysis].filter(Boolean).join("\n");
      const memo = String(data.memo || "").includes("リンモリブデン酸") ? data.memo : [data.memo, LITHIATION_NOTE_PATCH.memo].filter(Boolean).join("\n");
      return {...data, images, analysis, memo};
    }
    function loadNoteById(noteId, options = {}) {
      if (!noteId) return;
      jsonp({kind:"edit", note_id: noteId}, rec => {
        if (rec?.payload) {
          if (rec.payload.note_type === "optical") {
            location.replace("../optical_dynamic_note_app/index.html?note_id=" + encodeURIComponent(noteId));
            return;
          }
          if (options.expectSaved && options.saveToken && rec.payload._save_token !== options.saveToken) {
            msg("保存確認NG: Sheetsから返った内容が今回保存した版ではありません。Apps Script URL/デプロイ先/Sheetを確認してください。");
            return;
          }
          setEditor(hydrateKnownNote(rec.payload));
          msg(options.expectSaved ? "保存確認OK: Sheets保存済みノートを読み込みました。" : "Sheets保存済みノートを読み込みました。");
        } else {
          const n = state.notes.find(x => x.note_id === noteId);
          if (options.expectSaved) {
            msg("保存確認できません。Apps Script URL、v5かどうか、Web app公開設定、note_idを確認してください: " + noteId);
          } else if (n) setEditor({...blankNote(), ...n, note_id: n.note_id});
          else if (fallbackTemplateRequested) msg("Sheets未保存のため、テンプレートを表示しています。Save to Sheets で同期開始できます。");
          else msg("指定ノートが見つかりません");
        }
      });
    }
    function verifySaved(noteId, saveToken, attempt = 1) {
      jsonp({kind:"edit", note_id: noteId}, rec => {
        const payload = rec?.payload;
        if (payload?._save_token === saveToken) {
          setEditor(hydrateKnownNote(payload));
          msg("保存確認OK: Sheets保存済みノートを読み込みました。");
          return;
        }
        if (attempt < 6) {
          msg("保存反映待ち... " + attempt + "/6");
          setTimeout(() => verifySaved(noteId, saveToken, attempt + 1), 1800);
          return;
        }
        msg("保存確認NG: Sheetsから返った内容が今回保存した版ではありません。Apps Script URL/デプロイ先/Sheetを確認してください。");
      });
    }
    function duplicateNoteById(noteId) {
      if (!noteId) return;
      jsonp({kind:"edit", note_id: noteId}, rec => {
        if (rec?.payload) {
          if (rec.payload.note_type === "optical") {
            location.replace("../optical_dynamic_note_app/index.html?duplicate_from=" + encodeURIComponent(noteId));
            return;
          }
          setEditor(asDuplicate(hydrateKnownNote(rec.payload)));
          msg("複製元を読み込みました。日付と条件を確認して Save to Sheets してください。");
        } else {
          msg("複製できません。Sheets本文payloadを取得できていないため、古い概要からは複製しません。入口のURL確認とApps Script v5以降を確認してください: " + noteId);
        }
      });
    }
    function loadNotes(){
      jsonp({kind:"notes"}, rows=>{
        state.notes=rows||[];
        msg("ノート一覧を読み込みました");
        if (requestedNoteId && (!state.currentId || fallbackTemplateRequested)) loadNoteById(requestedNoteId);
        if (duplicateFromId && !state.currentId) duplicateNoteById(duplicateFromId);
      });
    }
    function blankNote(){
      return { note_id:"", date:today(), method:"", product:"", title:"", keywords:"", subtitle:"", status:"ongoing", scale:"0.100", conc:"0.05", solvent:"toluene", scheme:"", reagents:defaultReagents(), operations:[{date:"", time:"", text:""}], analysis:"", memo:"", images:[] };
    }
    function setEditor(data){
      data = hydrateKnownNote(data);
      state.currentId=data.note_id;
      ["method","product","title","keywords","subtitle","status","scale","conc","solvent","analysis","memo"].forEach(k=>q("#"+k).value=data[k]||"");
      q("#date").value = normalizeDate(data.date, today());
      q("#title").value = data.title || titleFromFields(data.method, data.product);
      const shownTitle = q("#title").value || "Synthesis Experiment Note";
      document.title = shownTitle;
      q("#pageTitle").textContent = shownTitle;
      q("#pageLead").textContent = data.subtitle || [data.method, data.product].filter(Boolean).join(": ") || "Google Sheetsに保存する合成実験ノート。";
      if ((requestedNoteId || duplicateFromId) && endpoint()) document.body.classList.add("note-view");
      q("#schemePreview").hidden=!data.scheme; q("#schemePreview").src=data.scheme||"";
      renderReagents(data.reagents||defaultReagents());
      renderOperations(data.operations || (data.procedure ? [{date:"", time:"", text:data.procedure}] : [{date:"", time:"", text:""}]));
      renderImages(data.images||[]);
      recalc();
      autosizeAll();
    }
    function collect(){
      const title = titleFromFields();
      q("#title").value = title;
      return { note_id:state.currentId||idFromFields(), date:q("#date").value, method:q("#method").value, product:q("#product").value, title, keywords:q("#keywords").value, subtitle:q("#subtitle").value, status:q("#status").value, scale:q("#scale").value, conc:q("#conc").value, solvent:q("#solvent").value, scheme:q("#schemePreview").src && !q("#schemePreview").hidden ? q("#schemePreview").src : "", reagents:readReagents(), operations:readOperations(), analysis:q("#analysis").value, memo:q("#memo").value, images:[...q("#images").querySelectorAll("img")].map(img=>img.src) };
    }
    function renderReagents(rows){
      q("#reagentTable tbody").innerHTML = rows.map((r,i)=>`<tr>
        <td data-label="名称"><input data-k="name" value="${escapeAttr(r.name||"")}"></td>
        <td data-label="役割"><input data-k="role" value="${escapeAttr(r.role||"")}"></td>
        <td data-label="MW"><input data-k="mw" type="number" step="0.01" value="${escapeAttr(r.mw||"")}"></td>
        <td data-label="eq/mol%"><input data-k="eq" type="number" step="0.001" value="${escapeAttr(r.eq||"")}"></td>
        <td data-label="単位"><select data-k="unit"><option value="eq" ${r.unit!=="mol%"?"selected":""}>eq</option><option value="mol%" ${r.unit==="mol%"?"selected":""}>mol%</option></select></td>
        <td data-label="密度 g/mL"><input data-k="density" type="number" step="0.001" value="${escapeAttr(r.density||"")}"></td>
        <td data-label="mmol" class="num mmol"></td><td data-label="秤量/容量" class="num amount"></td><td data-label=""><button type="button" data-del="${i}">削除</button></td>
      </tr>`).join("");
    }
    function readReagents(){ return [...q("#reagentTable tbody").rows].map(row=>Object.fromEntries([...row.querySelectorAll("[data-k]")].map(el=>[el.dataset.k,el.value]))); }
    function renderOperations(rows){
      q("#operationTable tbody").innerHTML = rows.map((r,i)=>`<tr>
        <td data-label="日付"><input data-op="date" type="date" value="${escapeAttr(r.date||"")}"></td>
        <td data-label="時刻"><input data-op="time" type="time" value="${escapeAttr(r.time||"")}"></td>
        <td data-label="操作"><textarea data-op="text" placeholder="操作内容">${escapeAttr(r.text||"")}</textarea></td>
        <td data-label=""><button type="button" data-op-del="${i}">削除</button></td>
      </tr>`).join("");
      autosizeAll();
    }
    function readOperations(){ return [...q("#operationTable tbody").rows].map(row=>Object.fromEntries([...row.querySelectorAll("[data-op]")].map(el=>[el.dataset.op,el.value]))); }
    function recalc(){
      const scale=Number(q("#scale").value||0), conc=Number(q("#conc").value||0);
      q("#solventVol").value = conc ? `${fmt(scale/conc,2)} mL` : "";
      [...q("#reagentTable tbody").rows].forEach(row=>{
        const r=Object.fromEntries([...row.querySelectorAll("[data-k]")].map(el=>[el.dataset.k,el.value]));
        const mmol = r.unit==="mol%" ? scale*Number(r.eq||0)/100 : scale*Number(r.eq||0);
        const mw=Number(r.mw||0), density=Number(r.density||0), mg=mmol*mw;
        row.querySelector(".mmol").textContent=fmt(mmol,3);
        row.querySelector(".amount").textContent=density ? `${fmt(mg,2)} mg / ${fmt((mg/1000)/density*1000,1)} uL` : `${fmt(mg,2)} mg`;
      });
    }
    function renderImages(images){ q("#images").innerHTML=images.map(src=>`<img src="${src}" alt="">`).join(""); }
    function escapeAttr(v){ return String(v??"").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;"); }
    async function addFiles(files, target){
      for(const file of files){
        if(!file.type.startsWith("image/")) continue;
        const src=await new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(file); });
        if(target==="scheme"){ q("#schemePreview").src=src; q("#schemePreview").hidden=false; }
        else q("#images").insertAdjacentHTML("beforeend",`<img src="${src}" alt="">`);
      }
    }
    async function saveCurrent(){
      const button = q("#saveNote");
      const oldText = button.textContent;
      button.disabled = true;
      button.textContent = "Saving...";
      msg("Sheetsへ保存リクエストを送信中...");
      const data=collect();
      data._save_token = Date.now() + "-" + Math.random().toString(36).slice(2);
      state.currentId=data.note_id;
      try {
        await post({kind:"note", note_id:data.note_id, date:data.date, title:data.title, subtitle:data.subtitle, method:data.method, product:data.product, keywords:data.keywords, status:data.status, note_type:"synthesis", archived:false, updated_at:new Date().toISOString()});
        await post({kind:"edit", note_id:data.note_id, note_type:"synthesis", payload:{...data, note_type:"synthesis"}, updated_at:new Date().toISOString()});
        msg("保存リクエストを送りました。Sheetsから同じノートを読み直します: " + data.note_id);
        setTimeout(() => verifySaved(data.note_id, data._save_token), 1600);
      } finally {
        button.disabled = false;
        button.textContent = oldText;
      }
    }
    q("#saveNote").onclick=()=>saveCurrent().catch(e=>msg(e.message));
    q("#archiveNote").onclick=async()=>{
      if (!SharedNoteState.confirmDeleteArchive()) return;
      const button = q("#archiveNote");
      const oldText = button.textContent;
      button.disabled = true;
      button.textContent = "Archiving...";
      try {
        const data=collect();
        SharedNoteState.markNoteDeleted(data.note_id);
        await post({kind:"note", ...data, note_type:"synthesis", archived:true, updated_at:new Date().toISOString()});
        msg("削除/アーカイブしました");
        state.currentId="";
        loadNotes();
      } catch(e) {
        msg(e.message);
      } finally {
        button.disabled = false;
        button.textContent = oldText;
      }
    };
    q("#reagentTable").oninput=recalc;
    function autosizeAll(){ document.querySelectorAll("textarea").forEach(t=>{ t.style.height="auto"; t.style.height=t.scrollHeight+2+"px"; }); }
    document.addEventListener("input", e=>{ if(e.target.matches("textarea")) autosizeAll(); });
    q("#reagentTable").onclick=e=>{ const b=e.target.closest("[data-del]"); if(!b) return; b.closest("tr").remove(); recalc(); };
    q("#operationTable").onclick=e=>{ const b=e.target.closest("[data-op-del]"); if(!b) return; b.closest("tr").remove(); };
    q("#addReagent").onclick=()=>{ const rows=readReagents(); rows.push({name:"",role:"reagent",mw:"",eq:"1",unit:"eq",density:""}); renderReagents(rows); recalc(); };
    q("#addSolvent").onclick=()=>{ const rows=readReagents(); rows.push({name:"",role:"liquid reagent",mw:"",eq:"1",unit:"eq",density:""}); renderReagents(rows); recalc(); };
    q("#addOperation").onclick=()=>{ const rows=readOperations(); rows.push({date:"",time:"",text:""}); renderOperations(rows); };
    ["scale","conc","solvent"].forEach(id=>q("#"+id).addEventListener("input",recalc));
    ["method","product"].forEach(id=>q("#"+id).addEventListener("input",()=>{ q("#title").value=titleFromFields(); if(!requestedNoteId) q("#pageTitle").textContent=q("#title").value; }));
    q("#schemeFile").onchange=e=>addFiles(e.target.files,"scheme");
    q("#imageFile").onchange=e=>addFiles(e.target.files,"images");
    for(const [id,target] of [["schemeDrop","scheme"],["imageDrop","images"]]){
      const el=q("#"+id);
      el.ondragover=e=>{ e.preventDefault(); el.classList.add("drag"); };
      el.ondragleave=()=>el.classList.remove("drag");
      el.ondrop=e=>{ e.preventDefault(); el.classList.remove("drag"); addFiles(e.dataTransfer.files,target); };
    }
    document.addEventListener("paste", e=>{ const files=[...e.clipboardData.files]; if(files.length) addFiles(files,"images"); });
    setEditor(blankNote());
    const draftData = readDraft();
    if (draftData || prefillData) {
      const incomingData = {...blankNote(), ...(draftData || prefillData)};
      setEditor((fixedTemplateRequested || fallbackTemplateRequested) ? asFixedTemplate(incomingData) : asDuplicate(incomingData));
      msg((fixedTemplateRequested || fallbackTemplateRequested) ? "固定IDの新規ノートを読み込みました。Save to Sheets すると端末間で同じノートとして同期されます。" : "複製テンプレートを読み込みました。日付と条件を確認して Save to Sheets してください。");
    }
    if(endpoint()) loadNotes();
    else msg("Apps Script URL未設定です。入口ページでURLを保存してください。");
  </script>
</body>
</html>
