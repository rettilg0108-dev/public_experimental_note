    function b64ToBytes(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password) {
      const baseKey = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: b64ToBytes(payload.salt),
          iterations: payload.iterations,
          hash: "SHA-256"
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function openPage(password) {
      const key = await deriveKey(password);
      const encrypted = b64ToBytes(payload.ciphertext);
      const tag = b64ToBytes(payload.tag);
      const combined = new Uint8Array(encrypted.length + tag.length);
      combined.set(encrypted, 0);
      combined.set(tag, encrypted.length);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
        key,
        combined
      );
      return new TextDecoder().decode(decrypted);
    }

    document.getElementById("gate").addEventListener("submit", async (event) => {
      event.preventDefault();
      const error = document.getElementById("error");
      error.textContent = "";
      try {
        const html = await openPage(document.getElementById("password").value);
        document.open();
        document.write(html);
        document.close();
      } catch {
        error.textContent = "パスワードが違うか、復号に失敗しました。";
      }
    });
  </script>
